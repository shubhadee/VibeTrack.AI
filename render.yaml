services:
  - type: web_service
    name: VibeTrack Backend
    env: python
    root: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true

  - type: static_site
    name: VibeTrack Frontend
    env: static
    root: frontend
    buildCommand: npm install && npm run build
    publishPath: build
    autoDeploy: true
